apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opensovd.fullname" . }}
  labels:
    {{- include "opensovd.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opensovd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "opensovd.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opensovd.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
            {{- if .Values.tls.enabled }}
            - name: https
              containerPort: {{ .Values.tls.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: SOVD_SERVER__HOST
              value: {{ .Values.server.host | quote }}
            - name: SOVD_SERVER__PORT
              value: {{ .Values.server.port | quote }}
            - name: SOVD_LOGGING__LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: SOVD_LOGGING__FORMAT
              value: {{ .Values.logging.format | quote }}
            {{- if .Values.logging.otlpEndpoint }}
            - name: SOVD_LOGGING__OTLP_ENDPOINT
              value: {{ .Values.logging.otlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: SOVD_AUTH__ENABLED
              value: "true"
            {{- if .Values.auth.apiKeySecretName }}
            - name: SOVD_AUTH__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.apiKeySecretName }}
                  key: {{ .Values.auth.apiKeySecretKey }}
            {{- end }}
            {{- if .Values.auth.jwtSecretName }}
            - name: SOVD_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.jwtSecretName }}
                  key: {{ .Values.auth.jwtSecretKey }}
            - name: SOVD_AUTH__JWT_ALGORITHM
              value: {{ .Values.auth.jwtAlgorithm | quote }}
            {{- end }}
            {{- if .Values.auth.oidcIssuerUrl }}
            - name: SOVD_AUTH__OIDC_ISSUER_URL
              value: {{ .Values.auth.oidcIssuerUrl | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.rateLimit.enabled }}
            - name: SOVD_RATE_LIMIT__ENABLED
              value: "true"
            - name: SOVD_RATE_LIMIT__MAX_REQUESTS
              value: {{ .Values.rateLimit.maxRequests | quote }}
            - name: SOVD_RATE_LIMIT__WINDOW_SECS
              value: {{ .Values.rateLimit.windowSecs | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: /tls
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "opensovd.fullname" . }}-config
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
