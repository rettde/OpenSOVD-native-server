# ─────────────────────────────────────────────────────────────────────────────
# Observability stack for OpenSOVD-native-server (F2)
#
# Provides Jaeger (all-in-one) for distributed trace visualization.
# The SOVD server sends OTLP/gRPC traces when built with `--features otlp`
# and configured with:
#
#   [logging]
#   otlp_endpoint = "http://localhost:4317"
#
# Usage:
#   docker compose -f deploy/docker-compose.observability.yml up -d
#   # Jaeger UI: http://localhost:16686
# ─────────────────────────────────────────────────────────────────────────────

services:
  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      # OTLP gRPC receiver (traces from SOVD server)
      - "4317:4317"
      # OTLP HTTP receiver (alternative)
      - "4318:4318"
      # Jaeger UI
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
