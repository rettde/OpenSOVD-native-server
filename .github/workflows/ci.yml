name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Clippy pedantic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # rustfmt does not skip cfg-gated mod declarations — create empty
      # stubs for any OEM modules that are .gitignored.
      - name: Create OEM stubs + check formatting
        run: |
          grep -oP '(?<=cfg\(has_oem_)\w+' native-sovd/src/lib.rs | while read name; do
            f="native-sovd/src/oem_${name}.rs"
            [ -f "$f" ] || echo "// fmt stub" > "$f"
          done
          cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  build-systemd:
    name: Build (systemd feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p opensovd-native-server --features systemd
      - run: cargo clippy -p opensovd-native-server --features systemd -- -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  cross-check:
    name: Cross-compile check (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: cargo check --workspace --target aarch64-unknown-linux-gnu

  sovd-cdf-validate:
    name: SOVD CDF Validation (DSA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Generate fresh CDF from Rust code ────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate openapi-spec.json
        run: cargo test -p native-sovd export_openapi_spec -- --ignored 2>/dev/null || cargo test -p native-sovd export_openapi_spec

      # ── Install Redocly CLI + DSA SOVD rules (from GitHub, no fork) ─
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install DSA SOVD CDF Validator
        run: |
          npm install --no-save @redocly/cli@latest
          npm install --no-save github:dsagmbh/sovd-cdf-validator

      # ── Validate CDF against SOVD standard rules ────────────────────
      - name: Redocly lint (SOVD CDF rules)
        run: npx @redocly/cli lint --config .redocly.yaml openapi-spec.json

  security-audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/bom.json"
