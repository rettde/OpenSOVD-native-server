name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  lint:
    name: Clippy pedantic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # oem_mbds.rs is .gitignored (proprietary OEM profile). Create a minimal
      # stub so rustfmt can resolve the #[cfg(has_oem_mbds)] mod declaration.
      - name: Create OEM stub + check formatting
        run: |
          echo '// CI stub — real file is .gitignored (proprietary OEM profile)' > native-sovd/src/oem_mbds.rs
          cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace

  sovd-cdf-validate:
    name: SOVD CDF Validation (DSA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Generate fresh CDF from Rust code ────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate openapi-spec.json
        run: cargo test -p native-sovd export_openapi_spec -- --ignored 2>/dev/null || cargo test -p native-sovd export_openapi_spec

      # ── Install Redocly CLI + DSA SOVD rules (from GitHub, no fork) ─
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install DSA SOVD CDF Validator
        run: |
          npm install --no-save @redocly/cli@latest
          npm install --no-save github:dsagmbh/sovd-cdf-validator

      # ── Validate CDF against SOVD standard rules ────────────────────
      - name: Redocly lint (SOVD CDF rules)
        run: npx @redocly/cli lint --config .redocly.yaml openapi-spec.json

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/bom.json"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: opensovd-native:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
